<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DevOps Monitoring Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🚀 DevOps Monitoring Dashboard</h1>

<div class="container">

    <div class="card">
        <h2>📊 System Status</h2>
        <p id="status">Checking...</p>
        <p id="lastUpdate"></p>
    </div>

    <div class="card">
        <h2>🖥️ Service Status</h2>
        <p id="services">Loading...</p>
    </div>

    <div class="card">
        <h2>📦 System Info</h2>
        <pre id="info"></pre>
    </div>

    <div class="card">
        <h2>📜 Logs</h2>
        <div id="log"></div>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
